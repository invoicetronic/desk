<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">

<h2>Notifica Abbonamento</h2>

<table style="border-collapse: collapse; width: 100%; margin: 20px 0;">
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Utente</td>
        <td style="padding: 8px; border: 1px solid #ddd;">{{UserEmail}}</td>
    </tr>
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Evento</td>
        <td style="padding: 8px; border: 1px solid #ddd;">{{EventType}}</td>
    </tr>
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Stato</td>
        <td style="padding: 8px; border: 1px solid #ddd;">{{SubscriptionStatus}}</td>
    </tr>
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Data</td>
        <td style="padding: 8px; border: 1px solid #ddd;">{{EventDate}}</td>
    </tr>
</table>

<hr style="margin: 40px 0; border: none; border-top: 2px solid #5BBA91;">

<h2>Subscription Notification</h2>

<table style="border-collapse: collapse; width: 100%; margin: 20px 0;">
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">User</td>
        <td style="padding: 8px; border: 1px solid #ddd;">{{UserEmail}}</td>
    </tr>
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Event</td>
        <td style="padding: 8px; border: 1px solid #ddd;">{{EventType}}</td>
    </tr>
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Status</td>
        <td style="padding: 8px; border: 1px solid #ddd;">{{SubscriptionStatus}}</td>
    </tr>
    <tr>
        <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Date</td>
        <td style="padding: 8px; border: 1px solid #ddd;">{{EventDate}}</td>
    </tr>
</table>

</body>
</html>
