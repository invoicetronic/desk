name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  release:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            invoicetronic/desk:${{ github.ref_name }}
            invoicetronic/desk:latest

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: invoicetronic/desk
          short-description: Open-source, white-label web app for Italian electronic invoicing (FatturaPA/SDI)
          readme-filepath: ./DOCKERHUB.md

      - name: Publish native binaries
        run: |
          for rid in win-x64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            dotnet publish src/ -c release -r "$rid" --self-contained -p:PublishSingleFile=true -o "publish/$rid"
          done

      - name: Package binaries
        run: |
          mkdir -p artifacts
          cd publish
          for rid in win-x64 linux-x64 linux-arm64 osx-x64 osx-arm64; do
            zip -j "../artifacts/desk-${rid}.zip" "$rid"/*
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" artifacts/*.zip --generate-notes
