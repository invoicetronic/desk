name: Tests

on:
  push:
    branches-ignore:
      - test
    tags-ignore:
      - 'v*'
  pull_request:
  workflow_call:

jobs:
  unit:
    name: Unit & Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/Unit/

      - name: Build
        run: dotnet build tests/Unit/ --no-restore

      - name: Test
        run: dotnet test tests/Unit/ --no-build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/E2E/

      - name: Build
        run: dotnet build tests/E2E/ --no-restore

      - name: Install Playwright browsers
        run: pwsh $(find tests/E2E/bin -name playwright.ps1 -print -quit) install --with-deps chromium

      - name: Test
        run: dotnet test tests/E2E/ --no-build
